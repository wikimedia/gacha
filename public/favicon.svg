<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Soft green-yellow throat gradient representing nocturnal glow -->
    <radialGradient id="throat" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="60%" stop-color="#a3e635" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#3f6212" stop-opacity="0" />
    </radialGradient>
    <!-- White-to-cream petal depth gradient -->
    <linearGradient id="petal-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f4f4f5" />
    </linearGradient>
  </defs>

  <!-- Midnight dark blue circle backdrop -->
  <circle cx="50" cy="50" r="48" fill="#0f172a" />
  
  <!-- Glowing star outline sepals/petals -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#fef08a" stroke-width="1.5" opacity="0.4" />

  <!-- Flower Corolla Group: Large morning-glory fused corolla funnel -->
  <path d="M 50,15 
           C 62,14 74,22 80,33
           C 86,44 86,58 79,69
           C 72,80 58,86 45,84
           C 32,82 20,72 16,60
           C 12,48 16,33 25,23
           C 34,13 45,15 50,15 Z" 
        fill="url(#petal-grad)" 
        stroke="#eaecf0" 
        stroke-width="1" />

  <!-- Distinct 5-star fold ridges (crucial feature of Moonflower / Ipomoea alba) -->
  <path d="M 50,50 L 50,15" stroke="#dcfce7" stroke-width="2" stroke-linecap="round" opacity="0.8" />
  <path d="M 50,50 L 83,39" stroke="#dcfce7" stroke-width="2" stroke-linecap="round" opacity="0.8" />
  <path d="M 50,50 L 71,78" stroke="#dcfce7" stroke-width="2" stroke-linecap="round" opacity="0.8" />
  <path d="M 50,50 L 29,78" stroke="#dcfce7" stroke-width="2" stroke-linecap="round" opacity="0.8" />
  <path d="M 50,50 L 17,39" stroke="#dcfce7" stroke-width="2" stroke-linecap="round" opacity="0.8" />

  <!-- Center throat: yellow-green glowing funnel center -->
  <circle cx="50" cy="50" r="16" fill="url(#throat)" />
  
  <!-- Tiny center pistil/stamen dot -->
  <circle cx="50" cy="50" r="2.5" fill="#fef08a" />
</svg>